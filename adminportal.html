<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>EduMark — Admin Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f4f5f8;--white:#fff;--surf:#eef0f5;--surf2:#e8eaf0;--border:#dde0ea;--border2:#c8ccd8;--navy:#0f1f3d;--navy3:#1d2f4f;--blue:#1d4ed8;--blue-light:#eff4ff;--blue-dim:rgba(29,78,216,.1);--red:#b91c1c;--red-bg:#fef2f2;--green:#15803d;--green-bg:#f0fdf4;--amber:#b45309;--amber-bg:#fffbeb;--purple:#6d28d9;--purple-bg:#f5f3ff;--text:#0d1117;--text2:#4b5563;--text3:#9ca3af;--fo:'IBM Plex Sans',sans-serif;--fm:'IBM Plex Mono',monospace;--r:5px;--r2:8px;--shadow-sm:0 1px 2px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.06);--shadow-lg:0 16px 48px rgba(0,0,0,.12)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--fo);min-height:100vh;display:flex;flex-direction:column;font-size:14px;line-height:1.6}
.hidden{display:none!important}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--surf)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
#login-page{flex:1;display:flex;min-height:100vh}
.ll{width:380px;flex-shrink:0;background:var(--navy);padding:3rem;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.ll::before{content:'';position:absolute;bottom:-80px;left:-80px;width:320px;height:320px;border:1px solid rgba(255,255,255,.04);border-radius:50%}
.ll h2{font-size:1.7rem;font-weight:700;color:#fff;line-height:1.25;margin-bottom:.75rem;letter-spacing:-.02em}
.ll p{font-size:.82rem;color:rgba(255,255,255,.4);line-height:1.75}
.ll-footer{font-family:var(--fm);font-size:.58rem;color:rgba(255,255,255,.18);letter-spacing:.06em;text-transform:uppercase;position:relative;z-index:1}
.lr{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--bg)}
.lr-inner{width:100%;max-width:360px}
.lr-inner h3{font-size:1.25rem;font-weight:700;margin-bottom:.25rem;letter-spacing:-.02em}
.lr-inner>p{font-size:.83rem;color:var(--text2);margin-bottom:2rem}
.field{margin-bottom:1rem}
.field label{display:block;font-family:var(--fm);font-size:.62rem;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.38rem}
.field input,.field select{width:100%;border:1px solid var(--border);border-radius:var(--r);padding:.6rem .9rem;font-family:var(--fo);font-size:.9rem;color:var(--text);background:var(--white);outline:none;transition:all .15s}
.field input:focus,.field select:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-dim)}
.err{font-family:var(--fm);font-size:.68rem;color:var(--red);margin-top:.4rem;min-height:1em}
.hint{font-family:var(--fm);font-size:.65rem;color:var(--text3);margin-top:.3rem}
.btn-login{width:100%;background:var(--navy);color:#fff;border:none;border-radius:var(--r);padding:.72rem;font-family:var(--fo);font-size:.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:background .15s;margin-top:.6rem}
.btn-login:hover{background:var(--navy3)}.btn-login:disabled{opacity:.5;cursor:default}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.32rem;padding:.4rem .88rem;border-radius:var(--r);font-family:var(--fo);font-size:.78rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#1a44c2}
.btn-outline{background:var(--white);border:1px solid var(--border);color:var(--text2)}.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn-danger{background:var(--white);border:1px solid rgba(185,28,28,.25);color:var(--red)}.btn-danger:hover{background:var(--red-bg)}
.btn-sm{padding:.28rem .68rem;font-size:.72rem}.btn-xs{padding:.18rem .52rem;font-size:.68rem}
.btn:disabled{opacity:.4;cursor:default;pointer-events:none}
#app{flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--navy);height:54px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tb-l{display:flex;align-items:center;gap:.9rem}
.tb-logo{font-size:.95rem;font-weight:700;color:#fff;letter-spacing:-.02em}
.tb-pipe{width:1px;height:16px;background:rgba(255,255,255,.15)}
.tb-sec{font-family:var(--fm);font-size:.58rem;color:rgba(255,255,255,.35);letter-spacing:.1em;text-transform:uppercase}
.tb-r{display:flex;align-items:center;gap:.75rem}
.tb-name{font-size:.78rem;color:rgba(255,255,255,.55)}
.btn-so{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.6);padding:.27rem .75rem;border-radius:4px;font-family:var(--fo);font-size:.72rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-so:hover{background:rgba(255,255,255,.16)}
.app-body{display:flex;flex:1}
.sidebar{width:220px;background:var(--white);border-right:1px solid var(--border);flex-shrink:0;padding:.8rem;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto;display:flex;flex-direction:column}
.sb-lbl{font-family:var(--fm);font-size:.58rem;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);padding:0 .5rem;margin:.6rem 0 .35rem}
.sb-item{display:flex;align-items:center;gap:.55rem;padding:.46rem .68rem;border-radius:var(--r2);font-size:.84rem;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all .15s}
.sb-item .ico{width:17px;text-align:center;font-size:.88rem}
.sb-item:hover{background:var(--surf);color:var(--text)}.sb-item.active{background:var(--blue-light);color:var(--blue);font-weight:600}
.main{flex:1;padding:1.8rem;overflow-x:hidden}
.pg-hd{margin-bottom:1.4rem}.pg-hd h2{font-size:1.2rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.2rem}.pg-hd p{font-size:.8rem;color:var(--text2)}
.tbl-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:1.5rem}
.tbl-hd{padding:.8rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.tbl-hd h3{font-size:.88rem;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:.83rem}
thead th{background:var(--surf);padding:.52rem 1.2rem;text-align:left;font-family:var(--fm);font-size:.6rem;font-weight:500;text-transform:uppercase;letter-spacing:.09em;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap}
th.c{text-align:center}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
.data-row:hover{background:var(--surf)}
td{padding:.62rem 1.2rem;vertical-align:middle}td.c{text-align:center}
/* Batch expand */
.batch-row{cursor:pointer;user-select:none}
.batch-row:hover{background:var(--blue-light)!important}
.batch-row.open{background:var(--blue-light)!important}
.batch-row td:first-child{padding-left:.8rem}
.expand-arrow{display:inline-block;font-size:.6rem;color:var(--text3);margin-right:.4rem;transition:transform .2s}
.batch-row.open .expand-arrow{transform:rotate(90deg);color:var(--blue)}
.expand-row{background:var(--bg)!important}
.expand-row:hover{background:var(--bg)!important}
.expand-row td{padding:0!important;border-bottom:2px solid var(--blue-dim)!important}
.expand-inner{padding:.9rem 1rem .9rem 2.5rem}
.expand-inner table{font-size:.8rem;background:var(--white);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.expand-inner thead th{background:var(--blue-light);font-size:.58rem;padding:.38rem .9rem;color:var(--blue)}
.expand-inner td{padding:.48rem .9rem}
/* Tags */
.tag{display:inline-block;padding:.14rem .52rem;border-radius:4px;font-family:var(--fm);font-size:.68rem;font-weight:500;letter-spacing:.01em}
.tag-green{background:var(--green-bg);color:var(--green)}.tag-blue{background:var(--blue-light);color:var(--blue)}
.tag-purple{background:var(--purple-bg);color:var(--purple)}.tag-amber{background:var(--amber-bg);color:var(--amber)}
/* Chips */
.subj-chips{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.4rem;min-height:2rem}
.subj-chip{display:inline-flex;align-items:center;gap:.25rem;padding:.3rem .75rem;border-radius:99px;font-family:var(--fm);font-size:.72rem;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--text2);transition:all .15s;user-select:none}
.subj-chip:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.subj-chip.selected{background:var(--blue);border-color:var(--blue);color:#fff}
.subj-chip.selected .chip-x{opacity:.75;font-size:.65rem}
/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(15,31,61,.5);display:flex;align-items:center;justify-content:center;z-index:300;padding:1rem;backdrop-filter:blur(2px)}
.modal{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:1.8rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal h3{font-size:1rem;font-weight:700;margin-bottom:.2rem}.modal p.ms{font-size:.8rem;color:var(--text2);margin-bottom:1.2rem;line-height:1.6}
.modal-foot{display:flex;gap:.5rem;margin-top:1.1rem}
.step-bar{display:flex;margin-bottom:1.4rem;border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.step-pill{flex:1;text-align:center;font-family:var(--fm);font-size:.65rem;font-weight:600;padding:.42rem;background:var(--surf);color:var(--text3);border-right:1px solid var(--border)}
.step-pill:last-child{border-right:none}
.step-pill.active{background:var(--blue);color:#fff}
.step-pill.done{background:var(--green-bg);color:var(--green)}
.lock-badge{display:inline-flex;align-items:center;gap:.3rem;background:var(--surf2);border:1px solid var(--border);border-radius:4px;padding:.18rem .52rem;font-family:var(--fm);font-size:.68rem;color:var(--text2)}
.spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .6s linear infinite;display:inline-block}
.loading{display:flex;align-items:center;justify-content:center;padding:3.5rem;gap:.7rem;color:var(--text2);font-family:var(--fm);font-size:.78rem}
.empty{text-align:center;padding:3rem 2rem;color:var(--text2)}
#toast{position:fixed;bottom:1.8rem;right:1.8rem;background:var(--navy);color:#fff;padding:.72rem 1.25rem;border-radius:var(--r2);font-family:var(--fm);font-size:.76rem;z-index:999;transform:translateY(60px);opacity:0;transition:all .3s ease;max-width:320px;box-shadow:var(--shadow-lg)}
#toast.show{transform:translateY(0);opacity:1}#toast.ok{border-left:3px solid var(--green)}#toast.err{border-left:3px solid var(--red)}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:780px){.ll{display:none}.sidebar{display:none}.main{padding:1rem}.topbar{padding:0 1rem}}
</style>
</head>
<body>

<div id="login-page">
  <div class="ll">
    <div>
      <h2>Admin Console</h2>
      <p>Manage batches, students, teachers and course enrollments for EduMark</p>
    </div>
    <div class="ll-footer">EduMark Administration</div>
  </div>
  <div class="lr">
    <div class="lr-inner">
      <h3>Admin Login</h3>
      <p>Enter your admin credentials</p>
      <div class="field"><label>Email</label><input id="login-email" type="email" placeholder="admin@example.com"/></div>
      <div class="field"><label>Password</label>
        <div style="position:relative">
          <input id="login-pw" type="password" placeholder="Password" style="padding-right:2.4rem"/>
          <button type="button" onclick="toggleEye('login-pw','eye-admin')" style="position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:1rem;padding:0;line-height:1" id="eye-admin"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>
      <div id="login-err" class="err"></div>
      <button class="btn-login" id="login-btn" onclick="doLogin()">Login</button>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="tb-l">
      <span class="tb-logo">EduMark</span>
      <span class="tb-pipe"></span>
      <span class="tb-sec">Admin</span>
    </div>
    <div class="tb-r">
      <span class="tb-name" id="tb-name"></span>
      <button class="btn-so" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="app-body">
    <div class="sidebar">
      <div class="sb-lbl">Management</div>
      <button class="sb-item active" data-tab="batches"  onclick="switchTab('batches',this)"><span class="ico">📦</span> Batches</button>
      <button class="sb-item"        data-tab="students" onclick="switchTab('students',this)"><span class="ico">👥</span> Students</button>
      <button class="sb-item"        data-tab="teachers" onclick="switchTab('teachers',this)"><span class="ico">📋</span> Teachers</button>
      <button class="sb-item"        data-tab="resources" onclick="switchTab('resources',this)"><span class="ico">📚</span> Resources</button>
    </div>
    <div class="main"><div id="content"></div></div>
  </div>
</div>

<div id="modal-bg" class="modal-ov hidden" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()"><div id="modal-content"></div></div>
</div>
<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://fxhmiryfpxinwlmevqev.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4aG1pcnlmcHhpbndsbWV2cWV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTE4MTYsImV4cCI6MjA4Nzc4NzgxNn0.Pw82Om1-tvGUcwN75EklMwhtxdwwjvgjSxcHO9f4kWU';
const {createClient} = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);
const dbAuth = createClient(SUPABASE_URL, SUPABASE_ANON, {auth:{storageKey:'edumark-signup'}});

const COURSE_SUBJECTS = {
  NUST:  ['Physics','Math','Basic Math','Chemistry','English'],
  FAST:  ['Math','Basic Math','IQ/Analytical Skills','English'],
  MDCAT: ['Biology','Chemistry','Physics','English','Logical Reasoning'],
  ECAT:  ['Physics','Math','Chemistry','English']
};
const ALL_SUBJECTS = ['Physics','Math','Basic Math','Chemistry','Biology','English','IQ/Analytical Skills','Logical Reasoning'];

let me=null, currentTab='batches', _tt, _expandedBatch=null;
let _coursesCache=null, _subjectsCache=null;
let _newStudent={};

/* ── PASSWORD GENERATOR ──
   seed1 = name, seed2 = rollNo or email (adds extra uniqueness)
   Format: 2 initials + 4-digit ascii sum + 4-digit timestamp slice = 10 chars */
function generatePassword(name, seed2=''){
  const initials=(name||'User').replace(/\s+/g,' ').trim().split(' ')
    .map(w=>w[0]?.toUpperCase()||'X').join('').slice(0,2).padEnd(2,'X');
  const combined=(name||'')+(seed2||'');
  const asciiSum=combined.split('').reduce((s,c)=>s+c.charCodeAt(0),0);
  const asciiPart=String(asciiSum%10000).padStart(4,'0');
  const timePart=String(Date.now()).slice(-4);
  return initials+asciiPart+timePart;
}

/* ── helpers ── */
function toggleEye(inputId,btnId){
  const i=document.getElementById(inputId);const b=document.getElementById(btnId);
  const eyeOn='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  const eyeOff='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
  if(i.type==='password'){i.type='text';b.innerHTML=eyeOff;}else{i.type='password';b.innerHTML=eyeOn;}
}
function toast(msg,type='ok'){const el=document.getElementById('toast');el.textContent=msg;el.className=`show ${type}`;clearTimeout(_tt);_tt=setTimeout(()=>el.className='',3500);}
function openModal(html){document.getElementById('modal-content').innerHTML=html;document.getElementById('modal-bg').classList.remove('hidden');}
function closeModal(e){if(!e||e.target===document.getElementById('modal-bg'))document.getElementById('modal-bg').classList.add('hidden');}
async function getCourses(){if(_coursesCache)return _coursesCache;const{data}=await db.from('courses').select('id,name');_coursesCache=data||[];return _coursesCache;}
async function getSubjects(){if(_subjectsCache)return _subjectsCache;const{data}=await db.from('subjects').select('id,name');_subjectsCache=data||[];return _subjectsCache;}
async function getCourseId(n){return(await getCourses()).find(c=>c.name===n)?.id;}
async function getSubjectId(n){return(await getSubjects()).find(s=>s.name===n)?.id;}

/* WhatsApp send credentials */
function sendWhatsAppCredentials(phone,username,password,role){
  if(!phone){toast('No WhatsApp number on file','err');return;}
  const clean=phone.replace(/\D/g,'');
  const msg=role==='student'
    ? `*EduMark Student Login*\n\nRoll No: ${username}\nPassword: ${password}\n\nLogin at your student portal.`
    : `*EduMark Teacher Login*\n\nEmail: ${username}\nPassword: ${password}\n\nLogin at your teacher portal.`;
  window.open(`https://wa.me/${clean}?text=${encodeURIComponent(msg)}`,'_blank');
}

/* ── auth ── */
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-pw').value;
  const err=document.getElementById('login-err');err.textContent='';
  if(!email||!pw){err.textContent='Fill all fields';return;}
  const btn=document.getElementById('login-btn');btn.disabled=true;btn.innerHTML='<span class="spin"></span> Logging in…';
  const{data,error}=await db.auth.signInWithPassword({email,password:pw});
  if(error){btn.disabled=false;btn.textContent='Login';err.textContent=error.message;return;}
  const{data:prof}=await db.from('profiles').select('*').eq('id',data.user.id).eq('role','admin').single();
  if(!prof){await db.auth.signOut();btn.disabled=false;btn.textContent='Login';err.textContent='Admin access required';return;}
  me=prof;showApp();
}
async function doLogout(){
  await db.auth.signOut();
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-page').classList.remove('hidden');
  me=null;
  // Reset login form and button
  document.getElementById('login-email').value='';
  document.getElementById('login-pw').value='';
  document.getElementById('login-err').textContent='';
  const btn=document.getElementById('login-btn');btn.disabled=false;btn.textContent='Login';
}
function showApp(){
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('tb-name').textContent=me.full_name;
  switchTab('batches',document.querySelector('.sb-item[data-tab="batches"]'));
}
function switchTab(tab,btnEl){
  currentTab=tab;_expandedBatch=null;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  if(btnEl)btnEl.classList.add('active');
  if(tab==='batches')renderBatches();
  if(tab==='students')renderStudents();
  if(tab==='teachers')renderTeachers();
  if(tab==='resources')renderResourceCategories();
}

/* ════════ BATCHES ════════ */
async function renderBatches(){
  const el=document.getElementById('content');
  el.innerHTML='<div class="loading"><span class="spin"></span> Loading…</div>';
  const{data:batches}=await db.from('batches').select('id,name,year,created_at,courses(name)').order('created_at');

  let html=`<div class="pg-hd"><h2>Batches</h2><p>Click any row to expand and view students in that batch</p></div>
  <div class="tbl-card">
    <div class="tbl-hd"><h3>All Batches</h3><button class="btn btn-primary btn-sm" onclick="showCreateBatch()">+ Create Batch</button></div>
    <table><thead><tr><th>Batch Name</th><th>Course</th><th>Year</th><th class="c">Students</th><th>Created</th></tr></thead>
    <tbody id="batches-tbody">`;

  if(!batches||batches.length===0){
    html+='<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text3)">No batches yet.</td></tr>';
  } else {
    for(const b of batches){
      const{count}=await db.from('students').select('*',{count:'exact',head:true}).eq('batch_id',b.id);
      html+=`
      <tr class="batch-row" id="brow-${b.id}" onclick="toggleBatchExpand('${b.id}','${b.name.replace(/'/g,"\\'")}')">
        <td><span class="expand-arrow">▶</span><strong>${b.name}</strong></td>

async function toggleBatchExpand(batchId,batchName){
  const row=document.getElementById(`brow-${batchId}`);
  const expRow=document.getElementById(`bexp-${batchId}`);
  if(!row||!expRow)return;
  const isOpen=row.classList.contains('open');
  if(_expandedBatch&&_expandedBatch!==batchId){
    document.getElementById(`brow-${_expandedBatch}`)?.classList.remove('open');
    document.getElementById(`bexp-${_expandedBatch}`)?.classList.add('hidden');
  }
  if(isOpen){row.classList.remove('open');expRow.classList.add('hidden');_expandedBatch=null;return;}
  row.classList.add('open');expRow.classList.remove('hidden');_expandedBatch=batchId;
  const inner=document.getElementById(`binner-${batchId}`);
  inner.innerHTML='<div style="padding:.6rem 0;font-family:var(--fm);font-size:.74rem;color:var(--text2);display:flex;align-items:center;gap:.5rem"><span class="spin"></span> Loading students…</div>';
  await renderExpandedStudents(batchId,batchName,inner);
}

function buildChips(containerId,allSubjects,selectedNames){
  const c=document.getElementById(containerId);if(!c)return;
  c.innerHTML='';
  if(allSubjects.length===0){c.innerHTML='<span style="font-family:var(--fm);font-size:.74rem;color:var(--text3)">No subjects for this course.</span>';return;}
  allSubjects.forEach(s=>{
    const chip=document.createElement('span');
    chip.className='subj-chip'+(selectedNames.includes(s)?' selected':'');
    chip.dataset.name=s;
    const txt=document.createTextNode(s);
    chip.appendChild(txt);
    if(selectedNames.includes(s)){const x=document.createElement('span');x.className='chip-x';x.textContent=' ✕';chip.appendChild(x);}
    chip.onclick=()=>{
      const isSel=chip.classList.toggle('selected');
      // update ✕ indicator
      const existing=chip.querySelector('.chip-x');
      if(isSel&&!existing){const x=document.createElement('span');x.className='chip-x';x.textContent=' ✕';chip.appendChild(x);}
      if(!isSel&&existing)existing.remove();
    };
    c.appendChild(chip);
  });
}

function getSelected(containerId){
  return Array.from(document.querySelectorAll(`#${containerId} .subj-chip.selected`)).map(c=>c.dataset.name);
}

async function createStudentFinal(){
  const selected=getSelected('as-chips');
  const err=document.getElementById('as2-err');err.textContent='';
  if(selected.length===0){err.textContent='Select at least one subject';return;}
  const btn=document.getElementById('create-btn-txt').parentElement;
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Creating…';

  const{name,batchId,phone}=_newStudent;
  const{data:rollData,error:rollErr}=await db.rpc('generate_roll',{p_batch_id:batchId});
  if(rollErr){err.textContent=rollErr.message;btn.disabled=false;btn.innerHTML='Create Student';return;}
  const rollNo=rollData;
  const pw=generatePassword(name,rollNo);
  const loginEmail=`${rollNo.toLowerCase()}@student.local`;

  const{data:authData,error:authErr}=await dbAuth.auth.signUp({email:loginEmail,password:pw});
  if(authErr){err.textContent=authErr.message;btn.disabled=false;btn.innerHTML='Create Student';return;}
  const newUserId=authData.user.id;

  const{error:profErr}=await db.from('profiles').insert({id:newUserId,full_name:name,role:'student',phone:phone||null,password_plain:pw});
  if(profErr){err.textContent=profErr.message;btn.disabled=false;btn.innerHTML='Create Student';return;}

  const{error:enrollErr}=await db.rpc('enroll_student',{p_profile_id:newUserId,p_batch_id:batchId});
  if(enrollErr){err.textContent=enrollErr.message;btn.disabled=false;btn.innerHTML='Create Student';return;}

  for(const subjName of selected){
    const subjectId=await getSubjectId(subjName);
    if(subjectId) await db.from('student_subjects').insert({student_id:newUserId,subject_id:subjectId});
  }
  toast(`"${name}" created! Roll: ${rollNo}`);
  closeModal();
  if(currentTab==='students')renderStudents();
  if(currentTab==='batches')renderBatches();
}

/* Manage subjects toggle */
async function showManageSubjects(studentId,studentName,batchId,courseName){
  openModal(`<h3>Subjects: ${studentName}</h3>
    <p class="ms">Click to add · Click highlighted to remove</p>
    <div class="subj-chips" id="ms-chips"><span style="font-family:var(--fm);font-size:.74rem;color:var(--text3)">Loading…</span></div>
    <div id="ms-err" class="err" style="margin-top:.6rem"></div>
    <div class="modal-foot">
      <button class="btn btn-primary" onclick="saveSubjects('${studentId}','${batchId}')">Save Changes</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>`);

  if(!courseName&&batchId){
    const{data:b}=await db.from('batches').select('courses(name)').eq('id',batchId).single();
    courseName=b?.courses?.name||'';
  }
  const allSubjects=COURSE_SUBJECTS[courseName]||[];
  const{data:enrolled}=await db.from('student_subjects').select('subjects(name)').eq('student_id',studentId);
  const enrolledNames=(enrolled||[]).map(e=>e.subjects?.name).filter(Boolean);
  buildChips('ms-chips',allSubjects,enrolledNames);
  document.getElementById('ms-chips').dataset.orig=JSON.stringify(enrolledNames);
}

async function saveSubjects(studentId,batchId){
  const err=document.getElementById('ms-err');err.textContent='';
  const selected=getSelected('ms-chips');
  const original=JSON.parse(document.getElementById('ms-chips').dataset.orig||'[]');
  const toAdd=selected.filter(s=>!original.includes(s));
  const toRemove=original.filter(s=>!selected.includes(s));
  for(const sn of toAdd){const id=await getSubjectId(sn);if(id)await db.from('student_subjects').insert({student_id:studentId,subject_id:id});}
  for(const sn of toRemove){const id=await getSubjectId(sn);if(id)await db.from('student_subjects').delete().eq('student_id',studentId).eq('subject_id',id);}
  toast(`${toAdd.length} added, ${toRemove.length} removed`);
  closeModal();
  if(currentTab==='students')renderStudents();
  if(currentTab==='batches'&&batchId){
    const{data:b}=await db.from('batches').select('name').eq('id',batchId).single();
    const inner=document.getElementById(`binner-${batchId}`);
    if(inner)await renderExpandedStudents(batchId,b?.name||'',inner);
  }
}

function showTransferStudent(){
  openModal(`<h3>Transfer Student</h3>
    <p class="ms">Move a student to another batch of the same course.</p>
    <div class="field"><label>Student</label><select id="tr-student" onchange="loadBatchesForTransfer()"><option value="">— Select —</option></select></div>
    <div class="field"><label>New Batch</label><select id="tr-batch"><option value="">— Select student first —</option></select></div>
    <div id="tr-err" class="err"></div>
    <div class="modal-foot">
      <button class="btn btn-primary" onclick="doTransfer()">Transfer</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>`);
  loadStudentsIntoSelect();
}
async function loadStudentsIntoSelect(){
  const{data:s}=await db.from('students').select('id,roll_no,batch_id,profiles(full_name),batches(id,course_id,courses(name))').order('roll_no');
  const sel=document.getElementById('tr-student');if(!sel)return;
  sel.innerHTML='<option value="">— Select —</option>';
  (s||[]).forEach(st=>{
    const opt=document.createElement('option');
    opt.value=st.id;
    opt.textContent=`${st.profiles?.full_name||'?'} (${st.roll_no})`;
    opt.dataset.batchId=st.batch_id;
    opt.dataset.courseId=st.batches?.course_id||'';
    sel.appendChild(opt);
  });
}
async function loadBatchesForTransfer(){
  const sel=document.getElementById('tr-student');
  const opt=sel.options[sel.selectedIndex];
  const courseId=opt?.dataset?.courseId;
  const currentBatchId=opt?.dataset?.batchId;
  const bSel=document.getElementById('tr-batch');
  bSel.innerHTML='<option value="">— Select —</option>';
  if(!courseId)return;
  const{data:batches}=await db.from('batches').select('id,name').eq('course_id',courseId).order('name');
  (batches||[]).forEach(b=>{
    if(b.id===currentBatchId)return; // skip current batch
    bSel.innerHTML+=`<option value="${b.id}">${b.name}</option>`;
  });
}
async function doTransfer(){
  const studentId=document.getElementById('tr-student').value;
  const newBatchId=document.getElementById('tr-batch').value;
  const err=document.getElementById('tr-err');err.textContent='';
  if(!studentId||!newBatchId){err.textContent='Select student and batch';return;}
  const{error}=await db.from('students').update({batch_id:newBatchId}).eq('id',studentId);
  if(error){err.textContent=error.message;return;}
  toast('Student transferred!');closeModal();
  if(currentTab==='students')renderStudents();
  if(currentTab==='batches')renderBatches();
}

async function deleteStudent(studentId,name,batchId,batchName){
  if(!confirm(`Delete ${name}? This cannot be undone.`))return;
  const{error}=await db.rpc('delete_user_from_auth',{p_user_id:studentId});
  if(error){toast(error.message,'err');return;}
  toast(`${name} deleted`);
  if(currentTab==='batches'&&batchId){
    const inner=document.getElementById(`binner-${batchId}`);
    if(inner)await renderExpandedStudents(batchId,batchName||'',inner);
    // update count in batch row
    const{count}=await db.from('students').select('*',{count:'exact',head:true}).eq('batch_id',batchId);
    const row=document.getElementById(`brow-${batchId}`);
    if(row){const tds=row.querySelectorAll('td');if(tds[3])tds[3].textContent=count||0;}
  } else renderStudents();
}

async function createTeacher(){
  const name=document.getElementById('at-name').value.trim();
  const email=document.getElementById('at-email').value.trim();
  const phone=document.getElementById('at-phone').value.trim();
  const subjName=document.getElementById('at-subject').value;
  const err=document.getElementById('at-err');err.textContent='';
  if(!name||!email||!subjName){err.textContent='Fill all required fields';return;}
  const pw=generatePassword(name,email);
  const subjectId=await getSubjectId(subjName);
  if(!subjectId){err.textContent='Subject not found in DB';return;}
  const{data:authData,error:authErr}=await dbAuth.auth.signUp({email,password:pw});
  if(authErr){err.textContent=authErr.message;return;}
  const newUserId=authData.user.id;
  const{error:profErr}=await db.from('profiles').insert({id:newUserId,full_name:name,role:'teacher',email,phone:phone||null,password_plain:pw});
  if(profErr){err.textContent=profErr.message;return;}
  const{error:subjErr}=await db.from('teacher_subjects').insert({teacher_id:newUserId,subject_id:subjectId});
  if(subjErr){err.textContent=subjErr.message;return;}
  toast(`"${name}" created! Password saved. Now assign batches.`);
  closeModal();renderTeachers();
}

async function showAssignBatches(teacherId,teacherName){
  openModal(`<h3>Batches: ${teacherName}</h3>
    <p class="ms">Only batches whose course includes this teacher's subject are shown.</p>
    <div class="subj-chips" id="tb-chips"><span style="font-family:var(--fm);font-size:.74rem;color:var(--text3)">Loading…</span></div>
    <div id="tb-err" class="err" style="margin-top:.6rem"></div>
    <div class="modal-foot">
      <button class="btn btn-primary" onclick="saveTeacherBatches('${teacherId}')">Save</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>`);

  // Get teacher's subject
  const{data:ts}=await db.from('teacher_subjects').select('subject_id').eq('teacher_id',teacherId).maybeSingle();
  const subjectId=ts?.subject_id;

  // Get courses that include this subject via course_subjects mapping
  let validCourseIds=[];
  if(subjectId){
    const{data:cs}=await db.from('course_subjects').select('course_id').eq('subject_id',subjectId);
    validCourseIds=(cs||[]).map(c=>c.course_id);
  }

  // Only load batches belonging to those valid courses
  let allBatches=[];
  if(validCourseIds.length>0){
    const{data:b}=await db.from('batches').select('id,name,courses(name)').in('course_id',validCourseIds).order('name');
    allBatches=b||[];
  }

  const{data:assigned}=await db.from('teacher_batch_assignments').select('batch_id').eq('teacher_id',teacherId);
  const assignedIds=(assigned||[]).map(a=>a.batch_id);

  const c=document.getElementById('tb-chips');c.innerHTML='';
  if(allBatches.length===0){
    c.innerHTML='<span style="font-family:var(--fm);font-size:.74rem;color:var(--text3)">No batches available for this teacher\'s subject.</span>';
    c.dataset.orig=JSON.stringify(assignedIds);return;
  }
  (allBatches||[]).forEach(b=>{
    const chip=document.createElement('span');
    chip.className='subj-chip'+(assignedIds.includes(b.id)?' selected':'');
    chip.dataset.id=b.id;
    chip.textContent=`${b.name} (${b.courses?.name||'?'})`;
    if(assignedIds.includes(b.id)){const x=document.createElement('span');x.className='chip-x';x.textContent=' ✕';chip.appendChild(x);}
    chip.onclick=()=>{
      const isSel=chip.classList.toggle('selected');
      const ex=chip.querySelector('.chip-x');
      if(isSel&&!ex){const x=document.createElement('span');x.className='chip-x';x.textContent=' ✕';chip.appendChild(x);}
      if(!isSel&&ex)ex.remove();
    };
    c.appendChild(chip);
  });
  c.dataset.orig=JSON.stringify(assignedIds);
}

async function saveTeacherBatches(teacherId){
  const err=document.getElementById('tb-err');err.textContent='';
  const selected=Array.from(document.querySelectorAll('#tb-chips .subj-chip.selected')).map(c=>c.dataset.id);
  const original=JSON.parse(document.getElementById('tb-chips').dataset.orig||'[]');
  const toAdd=selected.filter(id=>!original.includes(id));
  const toRemove=original.filter(id=>!selected.includes(id));
  for(const batchId of toAdd)await db.from('teacher_batch_assignments').insert({teacher_id:teacherId,batch_id:batchId});
  for(const batchId of toRemove)await db.from('teacher_batch_assignments').delete().eq('teacher_id',teacherId).eq('batch_id',batchId);
  toast(`Batches: ${toAdd.length} added, ${toRemove.length} removed`);
  closeModal();renderTeachers();
}

async function deleteTeacher(teacherId,name){
  if(!confirm(`Delete ${name}?`))return;
  const{error}=await db.rpc('delete_user_from_auth',{p_user_id:teacherId});
  if(error){toast(error.message,'err');return;}
  toast(`${name} deleted`);renderTeachers();
}
