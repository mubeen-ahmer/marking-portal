<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>EduMark — Teacher Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--cream:#faf7f2;--cream2:#f2ede4;--white:#fff;--ink:#1a1612;--ink2:#4a4540;--ink3:#8a8078;--teal:#087e8b;--teal-light:#e0f7fa;--teal-dim:rgba(8,126,139,.1);--border:#ddd5c8;--border2:#c8bfb0;--red:#9b2335;--green:#2d6a4f;--shadow-sm:0 1px 3px rgba(26,22,18,.06);--shadow-lg:0 12px 40px rgba(26,22,18,.12);--fb:'Source Serif 4',Georgia,serif;--fm:'IBM Plex Mono',monospace;--r:6px;--r2:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);color:var(--ink);font-family:var(--fb);min-height:100vh;display:flex;flex-direction:column;font-size:15px;line-height:1.65}
.hidden{display:none!important}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--cream2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* LOGIN */
#login-page{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;min-height:100vh}
.login-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--shadow-lg);width:100%;max-width:880px;display:flex;overflow:hidden;min-height:520px}
.ll{width:340px;flex-shrink:0;background:var(--ink);padding:3rem 2.5rem;display:flex;flex-direction:column;justify-content:space-between}
.ll h2{font-size:1.75rem;font-weight:700;color:#fff;line-height:1.2;margin-bottom:.8rem;letter-spacing:-.02em}
.ll p{font-size:.82rem;color:rgba(255,255,255,.45);line-height:1.75}
.ll-footer{font-family:var(--fm);font-size:.6rem;color:rgba(255,255,255,.18);letter-spacing:.06em;text-transform:uppercase}
.lr{flex:1;padding:3rem;display:flex;flex-direction:column;justify-content:center}
.lr h3{font-size:1.5rem;font-weight:700;margin-bottom:.3rem;letter-spacing:-.02em}
.lr>p{font-size:.84rem;color:var(--ink3);margin-bottom:2rem}
.field{margin-bottom:1.1rem}
.field label{display:block;font-family:var(--fm);font-size:.65rem;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.4rem}
.field input,.field select{width:100%;border:1.5px solid var(--border);border-radius:var(--r);padding:.65rem 1rem;font-family:var(--fb);font-size:.92rem;color:var(--ink);background:var(--cream);outline:none;transition:all .18s}
.field input:focus,.field select:focus{border-color:var(--teal);background:var(--white);box-shadow:0 0 0 3px var(--teal-dim)}
.err{font-family:var(--fm);font-size:.7rem;color:var(--red);margin-top:.5rem;min-height:1em}
.btn-login{width:100%;background:var(--ink);color:#fff;border:none;border-radius:var(--r);padding:.78rem 1.5rem;font-size:.95rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:all .18s;margin-top:.5rem}
.btn-login:hover{background:#2d2820}.btn-login:disabled{opacity:.5;cursor:default}

/* APP SHELL */
#app{flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--ink);height:58px;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tb-brand{display:flex;align-items:center;gap:.75rem}
.tb-title{color:#fff;font-size:1rem;font-weight:700;letter-spacing:-.02em}
.tb-sep{color:rgba(255,255,255,.2);margin:0 .4rem}
.tb-tag{font-family:var(--fm);font-size:.6rem;color:rgba(255,255,255,.32);letter-spacing:.1em;text-transform:uppercase}
.tb-right{display:flex;align-items:center;gap:.8rem}
.tb-user{font-family:var(--fm);font-size:.7rem;color:rgba(255,255,255,.48)}
.btn-so{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.65);padding:.28rem .78rem;border-radius:4px;font-family:var(--fm);font-size:.68rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-so:hover{background:rgba(255,255,255,.15)}
.app-body{display:flex;flex:1}
.sidebar{width:218px;background:var(--white);border-right:1px solid var(--border);flex-shrink:0;padding:1.4rem .8rem;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;display:flex;flex-direction:column}
.sb-item{display:flex;align-items:center;gap:.6rem;padding:.52rem .72rem;border-radius:var(--r);font-size:.86rem;color:var(--ink2);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all .15s}
.sb-item:hover{background:var(--cream2);color:var(--ink)}.sb-item.active{background:var(--teal-light);color:var(--teal);font-weight:500}
.sb-info{background:var(--cream2);border:1px solid var(--border);border-radius:var(--r);padding:.72rem;margin-bottom:.75rem}
.sb-info .sl{font-family:var(--fm);font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:.3rem}
.sb-info .sv{font-size:.88rem;font-weight:700;color:var(--teal)}
.main{flex:1;padding:2rem 2.5rem;overflow-x:hidden}
.pg-title{font-size:1.7rem;font-weight:700;letter-spacing:-.03em;color:var(--ink);margin-bottom:.25rem}
.pg-sub{font-size:.83rem;color:var(--ink3);margin-bottom:1.5rem}

/* BATCH TABS */
.batch-tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.6rem}
.batch-tab{padding:.32rem .88rem;border-radius:99px;font-family:var(--fm);font-size:.72rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--ink3);transition:all .15s}
.batch-tab:hover{border-color:var(--teal);color:var(--teal)}
.batch-tab.active{background:var(--teal);border-color:var(--teal);color:#fff}

/* SECTIONS */
.section{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:1.6rem}
.section-hd{padding:.85rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;background:var(--cream2)}
.section-hd h3{font-size:.95rem;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:.5rem}
.section-hd h3 .ico{font-size:1rem}

/* ASSESSMENT LIST — inline row items */
.asmts-list{padding:.6rem 1.4rem}
.asmt-row{display:flex;align-items:center;justify-content:space-between;padding:.55rem 0;border-bottom:1px solid var(--border)}
.asmt-row:last-child{border-bottom:none}
.asmt-left{display:flex;align-items:center;gap:.8rem}
.asmt-title{font-weight:600;font-size:.9rem}
.asmt-meta{font-family:var(--fm);font-size:.68rem;color:var(--ink3)}
.asmt-badge{display:inline-block;background:var(--teal-light);color:var(--teal);border-radius:4px;padding:.1rem .45rem;font-family:var(--fm);font-size:.65rem;font-weight:600}
.asmt-empty{padding:1.2rem 0;font-family:var(--fm);font-size:.76rem;color:var(--ink3);text-align:center}

/* ADD ASSESSMENT inline form */
.add-asmt-form{padding:.8rem 1.4rem;border-top:1px solid var(--border);background:var(--cream);display:flex;align-items:flex-end;gap:.7rem;flex-wrap:wrap}
.add-asmt-form .fi{display:flex;flex-direction:column;gap:.3rem}
.add-asmt-form .fi label{font-family:var(--fm);font-size:.6rem;text-transform:uppercase;letter-spacing:.09em;color:var(--ink3)}
.add-asmt-form .fi input{border:1.5px solid var(--border);border-radius:var(--r);padding:.42rem .72rem;font-family:var(--fb);font-size:.88rem;background:var(--white);outline:none;transition:border-color .15s}
.add-asmt-form .fi input:focus{border-color:var(--teal)}
.add-asmt-form .fi input.shake{animation:shake .3s}

/* MARKS TABLE */
table{width:100%;border-collapse:collapse;font-size:.87rem}
thead th{background:var(--cream2);padding:.52rem 1.4rem;text-align:left;font-family:var(--fm);font-size:.6rem;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);border-bottom:1px solid var(--border);white-space:nowrap}
th.c{text-align:center}
tbody tr{border-bottom:1px solid var(--border);transition:background .12s}
tbody tr:last-child{border-bottom:none}tbody tr:hover{background:var(--cream)}
td{padding:.65rem 1.4rem;vertical-align:middle}td.c{text-align:center}
.mk-input{width:64px;background:var(--cream);border:1.5px solid var(--border);border-radius:5px;padding:.35rem .5rem;font-family:var(--fm);font-size:.85rem;text-align:center;outline:none;transition:border-color .15s;color:var(--ink)}
.mk-input:focus{border-color:var(--teal);background:var(--white)}
.mk-input.dirty{border-color:#f59e0b;background:#fffdf5}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.32rem;padding:.38rem .82rem;border-radius:var(--r);font-family:var(--fm);font-size:.75rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--teal);color:#fff}.btn-primary:hover{background:#066370}
.btn-outline{background:var(--white);border:1.5px solid var(--border);color:var(--ink2)}.btn-outline:hover{border-color:var(--teal);color:var(--teal)}
.btn-danger{background:var(--white);border:1.5px solid rgba(155,35,53,.25);color:var(--red)}.btn-danger:hover{background:#fce8eb}
.btn-sm{padding:.26rem .64rem;font-size:.7rem}
.btn-xs{padding:.16rem .48rem;font-size:.66rem}
.btn:disabled{opacity:.4;cursor:default;pointer-events:none}

/* MISC */
.spin{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--teal);border-radius:50%;animation:sp .6s linear infinite;display:inline-block}
.loading{display:flex;align-items:center;justify-content:center;padding:4rem;gap:.8rem;color:var(--ink3);font-family:var(--fm);font-size:.78rem}
.empty{text-align:center;padding:4rem 2rem;color:var(--ink3)}
#toast{position:fixed;bottom:1.8rem;right:1.8rem;background:var(--ink);color:#fff;padding:.72rem 1.25rem;border-radius:var(--r2);font-family:var(--fm);font-size:.76rem;z-index:999;transform:translateY(60px);opacity:0;transition:all .3s;max-width:300px;box-shadow:var(--shadow-lg)}
#toast.show{transform:translateY(0);opacity:1}#toast.ok{border-left:3px solid var(--green)}#toast.err{border-left:3px solid var(--red)}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@media(max-width:780px){.ll{display:none}.sidebar{display:none}.main{padding:1rem}.topbar{padding:0 1rem}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-card">
    <div class="ll">
      <div>
        <h2>EduMark</h2>
        <p>Manage student marks and assessments for your assigned batches and subject.</p>
      </div>
      <div class="ll-footer">Teacher Portal</div>
    </div>
    <div class="lr">
      <h3>Teacher Login</h3>
      <p>Enter your email and password</p>
      <div class="field"><label>Email</label><input id="tl-email" type="email" placeholder="teacher@example.com"/></div>
      <div class="field"><label>Password</label>
        <div style="position:relative">
          <input id="tl-pw" type="password" placeholder="Password" style="padding-right:2.4rem"/>
          <button type="button" onclick="toggleEye('tl-pw','eye-tl')" style="position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink3);font-size:1rem;padding:0;line-height:1" id="eye-tl"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>
      <div id="tl-err" class="err"></div>
      <button class="btn-login" id="tl-btn" onclick="doLogin()">Login →</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="tb-brand">
      <span class="tb-title">EduMark</span>
      <span class="tb-sep">/</span>
      <span class="tb-tag">Teacher</span>
    </div>
    <div class="tb-right">
      <span class="tb-user" id="tb-user"></span>
      <button class="btn-so" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="app-body">
    <div class="sidebar">
      <div class="sb-info"><div class="sl">Subject</div><div class="sv" id="sb-subject">—</div></div>
      <div class="sb-info"><div class="sl">Batches</div><div class="sv" id="sb-batches" style="font-size:.78rem;line-height:1.6">—</div></div>
      <button class="sb-item active" id="nav-main"     onclick="setNav('main');showMain()">📊 Marks & Assessments</button>
      <button class="sb-item"        id="nav-password" onclick="setNav('password');showPassword()">🔒 Change Password</button>
    </div>
    <div class="main" id="main"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://fxhmiryfpxinwlmevqev.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4aG1pcnlmcHhpbndsbWV2cWV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTE4MTYsImV4cCI6MjA4Nzc4NzgxNn0.Pw82Om1-tvGUcwN75EklMwhtxdwwjvgjSxcHO9f4kWU';
const{createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_ANON);

let me=null, _tt, _marksData={};
let _subjectId=null, _subjectName='', _batches=[];
let _selBatchId=null;

function toggleEye(inputId,btnId){
  const i=document.getElementById(inputId);const b=document.getElementById(btnId);
  const eyeOn='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  const eyeOff='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
  if(i.type==='password'){i.type='text';b.innerHTML=eyeOff;}else{i.type='password';b.innerHTML=eyeOn;}
}
function toast(msg,type='ok'){const el=document.getElementById('toast');el.textContent=msg;el.className=`show ${type}`;clearTimeout(_tt);_tt=setTimeout(()=>el.className='',3500);}
function setNav(key){document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));document.getElementById(`nav-${key}`)?.classList.add('active');}

/* ── AUTH ── */
async function doLogin(){
  const email=document.getElementById('tl-email').value.trim();
  const pw=document.getElementById('tl-pw').value;
  const err=document.getElementById('tl-err');err.textContent='';
  if(!email||!pw){err.textContent='Fill all fields';return;}
  const btn=document.getElementById('tl-btn');btn.disabled=true;btn.innerHTML='<span class="spin"></span> Logging in…';
  const{data,error}=await db.auth.signInWithPassword({email,password:pw});
  if(error){btn.disabled=false;btn.textContent='Login →';err.textContent=error.message;return;}
  const{data:prof}=await db.from('profiles').select('*').eq('id',data.user.id).eq('role','teacher').single();
  if(!prof){await db.auth.signOut();btn.disabled=false;btn.textContent='Login →';err.textContent='Teacher account required';return;}
  me=prof;await initApp();
}
async function doLogout(){
  await db.auth.signOut();
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-page').classList.remove('hidden');
  me=null;_batches=[];_subjectId=null;_marksData={};
  document.getElementById('tl-email').value='';
  document.getElementById('tl-pw').value='';
  document.getElementById('tl-err').textContent='';
  const btn=document.getElementById('tl-btn');btn.disabled=false;btn.textContent='Login →';
}
async function initApp(){
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('tb-user').textContent=me.full_name;
  const{data:ts}=await db.from('teacher_subjects').select('subject_id,subjects(name)').eq('teacher_id',me.id).maybeSingle();
  _subjectId=ts?.subject_id||null;
  _subjectName=ts?.subjects?.name||'—';
  document.getElementById('sb-subject').textContent=_subjectName;
  const{data:tbas}=await db.from('teacher_batch_assignments').select('batch_id,batches(id,name,course_id,courses(name))').eq('teacher_id',me.id);
  _batches=(tbas||[]).map(t=>({id:t.batch_id,name:t.batches?.name||'?',course_id:t.batches?.course_id,course_name:t.batches?.courses?.name||'?'}));
  document.getElementById('sb-batches').textContent=_batches.length>0?_batches.map(b=>b.name).join(', '):'None assigned';
  _selBatchId=_batches[0]?.id||null;
  showMain();
}

/* ════════════════════════════════════════
   MAIN — combined marks + assessments
════════════════════════════════════════ */
function showMain(){
  setNav('main');
  const el=document.getElementById('main');
  if(!_subjectId){el.innerHTML='<div class="empty"><p>No subject assigned. Contact admin.</p></div>';return;}
  if(_batches.length===0){el.innerHTML='<div class="empty"><p>No batches assigned. Contact admin.</p></div>';return;}
  if(!_selBatchId)_selBatchId=_batches[0].id;
  renderBatchView(_selBatchId);
}

async function renderBatchView(batchId){
  _selBatchId=batchId;
  _marksData={};
  const el=document.getElementById('main');
  const batch=_batches.find(b=>b.id===batchId);

  // Build batch tabs
  let tabsHtml='<div class="batch-tabs">';
  _batches.forEach(b=>{tabsHtml+=`<button class="batch-tab${b.id===batchId?' active':''}" onclick="renderBatchView('${b.id}')">${b.name}</button>`;});
  tabsHtml+='</div>';

  // Fetch assessments + students in parallel
  const[{data:assessments},{data:enrollments}]=await Promise.all([
    db.from('assessments').select('*').eq('subject_id',_subjectId).eq('batch_id',batchId).order('created_at'),
    db.from('student_subjects').select('student_id,students(id,roll_no,batch_id,profiles(full_name))').eq('subject_id',_subjectId)
  ]);

  // Filter students to this batch only
  const students=((enrollments||[])
    .map(e=>e.students)
    .filter(s=>s&&s.batch_id===batchId)
    .map(s=>({id:s.id,roll:s.roll_no,name:s.profiles?.full_name||'?'}))
  ).sort((a,b)=>a.roll.localeCompare(b.roll));

  // Fetch existing marks
  const asmtIds=(assessments||[]).map(a=>a.id);
  const markMap={};
  if(asmtIds.length>0&&students.length>0){
    const{data:marks}=await db.from('marks')
      .select('assessment_id,student_id,obtained_marks')
      .in('assessment_id',asmtIds)
      .in('student_id',students.map(s=>s.id));
    (marks||[]).forEach(m=>{
      if(!markMap[m.student_id])markMap[m.student_id]={};
      markMap[m.student_id][m.assessment_id]=m.obtained_marks;
    });
  }

  // Pre-fill _marksData
  students.forEach(s=>{
    _marksData[s.id]={};
    (assessments||[]).forEach(a=>{
      const v=(markMap[s.id]||{})[a.id];
      _marksData[s.id][a.id]=v!==undefined?v:'';
    });
  });

  let html=`
    <h1 class="pg-title">${_subjectName}</h1>
    <p class="pg-sub">${batch?.course_name||''} · ${students.length} student(s)</p>
    ${tabsHtml}

    <!-- ── ASSESSMENTS SECTION ── -->
    <div class="section">
      <div class="section-hd">
        <h3><span class="ico">📝</span> Assessments</h3>
      </div>
      <div class="asmts-list" id="asmts-list-${batchId}">`;

  if(!assessments||assessments.length===0){
    html+=`<div class="asmt-empty">No assessments yet — add one below.</div>`;
  } else {
    assessments.forEach(a=>{
      html+=`<div class="asmt-row" id="asmt-row-${a.id}">
        <div class="asmt-left">
          <span class="asmt-badge">${a.total_marks}M</span>
          <span class="asmt-title">${a.title}</span>
          <span class="asmt-meta">${new Date(a.created_at).toLocaleDateString()}</span>
        </div>
        <button class="btn btn-danger btn-xs" onclick="deleteAssessment('${a.id}','${a.title.replace(/'/g,"\\'")}','${batchId}')">Delete</button>
      </div>`;
    });
  }

  html+=`</div>
      <!-- Inline add form -->
      <div class="add-asmt-form" id="add-form-${batchId}">
        <div class="fi">
          <label>Title</label>
          <input id="af-title-${batchId}" type="text" placeholder="e.g. Unit Test 1" style="width:200px" onkeydown="if(event.key==='Enter')addAssessment('${batchId}')"/>
        </div>
        <div class="fi">
          <label>Total Marks</label>
          <input id="af-marks-${batchId}" type="number" min="1" placeholder="100" style="width:90px" onkeydown="if(event.key==='Enter')addAssessment('${batchId}')"/>
        </div>
        <button class="btn btn-primary btn-sm" onclick="addAssessment('${batchId}')">+ Add</button>
        <span id="af-err-${batchId}" style="font-family:var(--fm);font-size:.68rem;color:var(--red);align-self:center"></span>
      </div>
    </div>`;

  /* ── MARKS SECTION ── */
  html+=`<div class="section">
    <div class="section-hd">
      <h3><span class="ico">📊</span> Marks</h3>
      <div style="display:flex;gap:.5rem">
        <button class="btn btn-outline btn-sm" onclick="renderBatchView('${batchId}')">⟲ Reload</button>
        <button class="btn btn-primary btn-sm" onclick="saveMarks()">💾 Save Marks</button>
      </div>
    </div>`;

  if(students.length===0){
    html+=`<div class="empty" style="padding:2rem"><p>No students enrolled in this subject for this batch.</p></div>`;
  } else if(!assessments||assessments.length===0){
    html+=`<div class="empty" style="padding:2rem"><p>Add an assessment above to start entering marks.</p></div>`;
  } else {
    html+=`<div style="overflow-x:auto"><table><thead><tr>
      <th>Roll No</th><th>Name</th>`;
    assessments.forEach(a=>{
      html+=`<th class="c">${a.title}<br/><span style="font-weight:400;font-size:.6rem;opacity:.7">${a.total_marks}M</span></th>`;
    });
    html+=`<th class="c">Total</th></tr></thead><tbody>`;

    students.forEach(s=>{
      let rowTotal=0;
      html+=`<tr><td style="font-family:var(--fm);color:var(--teal);font-weight:600">${s.roll}</td><td style="font-weight:500">${s.name}</td>`;
      assessments.forEach(a=>{
        const val=(_marksData[s.id]||{})[a.id];
        if(val!==''&&val!==undefined&&val!==null)rowTotal+=Number(val);
        html+=`<td class="c">
          <input class="mk-input" type="number" min="0" max="${a.total_marks}"
            value="${val!==''&&val!==undefined&&val!==null?val:''}"
            data-sid="${s.id}" data-aid="${a.id}" data-max="${a.total_marks}"
            oninput="markChanged(this)" placeholder="—"/>
        </td>`;
      });
      html+=`<td class="c" id="row-total-${s.id}"><strong>${rowTotal||0}</strong></td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  html+=`</div>`;

  el.innerHTML=html;
}

/* ── Mark input change ── */
function markChanged(input){
  let val=input.value===''?null:Number(input.value);
  const max=Number(input.dataset.max);
  if(val!==null){
    if(val<0){val=0;input.value=0;}
    if(val>max){val=max;input.value=max;}
  }
  input.classList.add('dirty');
  if(!_marksData[input.dataset.sid])_marksData[input.dataset.sid]={};
  _marksData[input.dataset.sid][input.dataset.aid]=val;

  // Live-update row total
  const rowTotEl=document.getElementById(`row-total-${input.dataset.sid}`);
  if(rowTotEl){
    let sum=0;
    Object.values(_marksData[input.dataset.sid]).forEach(v=>{if(v!==null&&v!=='')sum+=Number(v);});
    rowTotEl.innerHTML=`<strong>${sum}</strong>`;
  }
}

/* ── Save marks ── */
async function saveMarks(){
  const records=[];
  for(const[sid,marks]of Object.entries(_marksData)){
    for(const[aid,val]of Object.entries(marks)){
      if(val===''||val===null||val===undefined)continue;
      records.push({student_id:sid,assessment_id:aid,obtained_marks:Number(val)});
    }
  }
  if(records.length===0){toast('No marks to save','err');return;}
  const{error}=await db.from('marks').upsert(records,{onConflict:'assessment_id,student_id'});
  if(error){toast(error.message,'err');return;}
  document.querySelectorAll('.mk-input.dirty').forEach(el=>el.classList.remove('dirty'));
  toast(`${records.length} mark(s) saved!`);
}

/* ── Add assessment (inline) ── */
async function addAssessment(batchId){
  const titleEl=document.getElementById(`af-title-${batchId}`);
  const marksEl=document.getElementById(`af-marks-${batchId}`);
  const errEl=document.getElementById(`af-err-${batchId}`);
  const title=titleEl.value.trim();
  const marks=parseInt(marksEl.value);
  errEl.textContent='';
  if(!title){
    titleEl.classList.add('shake');setTimeout(()=>titleEl.classList.remove('shake'),300);
    errEl.textContent='Enter a title';return;
  }
  if(!marks||marks<1){
    marksEl.classList.add('shake');setTimeout(()=>marksEl.classList.remove('shake'),300);
    errEl.textContent='Enter valid marks';return;
  }
  const{error}=await db.from('assessments').insert({
    batch_id:batchId,subject_id:_subjectId,title,total_marks:marks,created_by:me.id
  });
  if(error){errEl.textContent=error.message;return;}
  titleEl.value='';marksEl.value='';
  toast(`"${title}" added!`);
  // Re-render to pick up new assessment column
  await renderBatchView(batchId);
}

/* ── Delete assessment ── */
async function deleteAssessment(id,title,batchId){
  if(!confirm(`Delete "${title}"? All marks for this assessment will be removed.`))return;
  const{error}=await db.from('assessments').delete().eq('id',id);
  if(error){toast(error.message,'err');return;}
  toast(`"${title}" deleted`);
  await renderBatchView(batchId);
}

/* ── Password ── */

  document.getElementById('main').innerHTML=`<div>
    <h1 class="pg-title">Change Password</h1>

    <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:2rem;max-width:420px;box-shadow:var(--shadow-sm)">
      <div class="field"><label>Current Password</label>
        <div style="position:relative">
          <input id="pw-old" type="password" placeholder="Your current password" style="padding-right:2.4rem"/>
          <button type="button" onclick="toggleEye('pw-old','eye-old')" style="position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink3);font-size:1rem;padding:0;line-height:1" id="eye-old"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>
      <div class="field"><label>New Password</label>
        <div style="position:relative">
          <input id="pw-new" type="password" placeholder="Min 6 characters" style="padding-right:2.4rem"/>
          <button type="button" onclick="toggleEye('pw-new','eye-new')" style="position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink3);font-size:1rem;padding:0;line-height:1" id="eye-new"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>
      <div class="field"><label>Confirm New Password</label>
        <div style="position:relative">
          <input id="pw-confirm" type="password" placeholder="Repeat new password" style="padding-right:2.4rem"/>
          <button type="button" onclick="toggleEye('pw-confirm','eye-conf')" style="position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink3);font-size:1rem;padding:0;line-height:1" id="eye-conf"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>
      <div id="pw-err" class="err"></div>
      <button style="background:var(--ink);color:#fff;border:none;border-radius:var(--r);padding:.65rem 1.4rem;font-size:.9rem;font-weight:700;cursor:pointer;width:100%;margin-top:1rem" onclick="changePassword()">Update Password</button>
    </div>
  </div>`;
}
async function changePassword(){
  const oldPw=document.getElementById('pw-old').value;
  const newPw=document.getElementById('pw-new').value;
  const conf=document.getElementById('pw-confirm').value;
  const err=document.getElementById('pw-err');err.textContent='';
  if(!oldPw||!newPw||!conf){err.textContent='Fill all fields';return;}
  if(newPw.length<6){err.textContent='New password min 6 characters';return;}
  if(newPw!==conf){err.textContent='New passwords do not match';return;}
  // Verify old password by re-authenticating
  const{data:userData}=await db.auth.getUser();
  const{error:signInErr}=await db.auth.signInWithPassword({email:userData.user.email,password:oldPw});
  if(signInErr){err.textContent='Current password is incorrect';return;}
  const{error}=await db.auth.updateUser({password:newPw});
  if(error){err.textContent=error.message;return;}
  await db.from('profiles').update({password_plain:newPw}).eq('id',me.id);
  toast('Password updated!');showMain();
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded',async()=>{
  const{data:{user}}=await db.auth.getUser();
  if(user){
    const{data:prof}=await db.from('profiles').select('*').eq('id',user.id).eq('role','teacher').single();
    if(prof){me=prof;await initApp();}else{await db.auth.signOut();}
  }
});
</script>
